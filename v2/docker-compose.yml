services:
  db:
    image: postgres:16-alpine
    container_name: skillovate_v2_db
    environment:
      POSTGRES_USER: skillovate
      POSTGRES_PASSWORD: skillovate_secret
      POSTGRES_DB: skillovate_v2
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillovate -d skillovate_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillovate_v2_backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://skillovate:skillovate_secret@db:5432/skillovate_v2
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
